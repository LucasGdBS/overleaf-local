services:
  sharelatex:
    restart: always
    build: ./docker/sharelatex
    container_name: sharelatex
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 80:80
    stop_grace_period: 60s
    volumes:
      - ./data/sharelatex:/var/lib/overleaf
    environment:
      OVERLEAF_APP_NAME: Overleaf Community Edition
      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex
      OVERLEAF_REDIS_HOST: redis
      REDIS_HOST: redis
      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/login"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s

  mongo:
    restart: always
    image: mongo:8.0
    container_name: mongo
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    command: "--replSet overleaf"
    volumes:
      - ./data/mongo:/data/db
      - ./config/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js:ro
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      - mongo:127.0.0.1
    healthcheck:
      test: echo 'db.stats().ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    restart: always
    image: redis:6.2
    container_name: redis
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    volumes:
      - ./data/redis:/data

  sync:
    build: ./docker/sync
    container_name: overleaf-sync
    restart: unless-stopped
    profiles: [cron]
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - ./:/repo
    env_file:
      - .env
    environment:
      OVERLEAF_URL: http://sharelatex
    depends_on:
      sharelatex:
        condition: service_healthy
